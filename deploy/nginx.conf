# nginx site config for domain_info
# Fronted by a Cloudflare Tunnel -> localhost:80, so listen only on 127.0.0.1.

server {
    listen 127.0.0.1:80 default_server;
    listen [::1]:80 default_server;
    server_name _;

    client_max_body_size 1m;

    # ── gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── API -> node ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:6633;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;     # traceroute can be slow
    }

    # ── health (no auth) ──────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:6633/health;
        proxy_set_header Host $host;
    }

    # ── SPA static files ──────────────────────────────────────────────────────
    root /opt/domain_info/client/dist;
    index index.html;

    # Long cache for hashed assets, no cache for index.html (SPA)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: never cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: unknown paths serve index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
