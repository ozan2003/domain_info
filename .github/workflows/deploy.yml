name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: file:./prisma/dev.db
        run: npx prisma generate

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Show server build output
        working-directory: server
        run: ls -la dist

      - name: Show client build output
        working-directory: client
        run: ls -la dist

      - name: Copy build artifacts to a staging dir
        run: |
          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/server" "$STAGE/client"
          # Server: dist + prisma + node_modules_prod (no dev deps needed at runtime,
          # but we ship full node_modules to keep argon2 native bindings + traceroute
          # happy; size is acceptable)
          rsync -a --delete \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='tests/' \
            server/dist/        "$STAGE/server/dist/"
          rsync -a --delete \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='tests/' \
            server/node_modules/ "$STAGE/server/node_modules/"
          rsync -a --delete \
            server/prisma/      "$STAGE/server/prisma/"
          rsync -a --delete \
            server/package.json "$STAGE/server/"
          # Client
          rsync -a --delete client/dist/ "$STAGE/client/dist/"

      - name: Deploy to EC2 via rsync + ssh
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -eu
          # Diagnostics
          echo "EC2_HOST='${EC2_HOST}' (len=${#EC2_HOST})"
          echo "EC2_USER='${EC2_USER}'"
          echo "EC2_SSH_KEY length: ${#EC2_SSH_KEY}"
          echo "EC2_SSH_KEY first 5 chars: '${EC2_SSH_KEY:0:5}'"
          echo "EC2_SSH_KEY last 5 chars:  '${EC2_SSH_KEY: -5}'"

          mkdir -p ~/.ssh
          # Strip trailing newline and normalize CRLF -> LF, since the GitHub
          # web paste commonly appends extra characters.
          printf '%s' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          # Ensure exactly one trailing newline (some ssh versions require it).
          [ "$(tail -c1 ~/.ssh/deploy_key | wc -l)" -eq 0 ] && echo >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "deploy_key size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "deploy_key first 3 lines:"
          head -n 3 ~/.ssh/deploy_key
          echo "deploy_key last 3 lines:"
          tail -n 3 ~/.ssh/deploy_key
          echo "ssh-keygen -lf output:"
          ssh-keygen -lf ~/.ssh/deploy_key || echo "  (key parse FAILED)"

          # Disable strict host key check entirely — for a single-instance demo
          # the cost of a known_hosts mismatch outweighs the security benefit.
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "==> rsync server/"
          if ! rsync -az --delete \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
              "$RUNNER_TEMP/stage/server/" \
              "${EC2_USER}@${EC2_HOST}:/opt/domain_info/server/"; then
            echo "::error::rsync server/ failed (exit $?)"
            exit 1
          fi

          echo "==> rsync client/"
          if ! rsync -az --delete \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
              "$RUNNER_TEMP/stage/client/" \
              "${EC2_USER}@${EC2_HOST}:/opt/domain_info/client/"; then
            echo "::error::rsync client/ failed (exit $?)"
            exit 1
          fi

          echo "==> restart service"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${EC2_USER}@${EC2_HOST}" \
            'sudo systemctl restart domain_info && sleep 2 && sudo systemctl is-active domain_info'
